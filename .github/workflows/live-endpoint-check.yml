name: Live endpoint check

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-endpoint-check
  cancel-in-progress: false

jobs:
  live-check:
    name: Live Lewisham contract check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: >
          uv sync
          --all-packages
          --all-groups
          --python 3.12

      - name: Require schedule fixture secret
        env:
          LEWISHAM_LIVE_TEST_UPRN: ${{ secrets.LEWISHAM_LIVE_TEST_UPRN }}
        run: |
          if [ -z "$LEWISHAM_LIVE_TEST_UPRN" ]; then
            echo "LEWISHAM_LIVE_TEST_UPRN must be configured for the live schedule check."
            exit 1
          fi

      - name: Run live endpoint checks
        env:
          UV_PYTHON: "3.12"
          LEWISHAM_LIVE_TEST_UPRN: ${{ secrets.LEWISHAM_LIVE_TEST_UPRN }}
        run: make live-check
