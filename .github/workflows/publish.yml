# PyPI publishing uses Trusted Publisher (OIDC) — no stored secrets required.
# Before the first release, configure a Trusted Publisher on PyPI:
#   Publisher: GitHub Actions
#   Repository owner: OliverFarren
#   Repository name: lewisham-council-scraper
#   Workflow filename: publish.yml
#   Environment name: pypi
# Then create a "pypi" environment in GitHub repository Settings → Environments.

jobs:
  publish-pypi:
    name: Publish lewisham-client to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build
        run: uv build --package lewisham-client

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
