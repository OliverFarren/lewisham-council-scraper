# PyPI publishing uses Trusted Publisher (OIDC) — no stored secrets required.
# Before the first release, configure a Trusted Publisher on PyPI:
#   Publisher: GitHub Actions
#   Repository owner: OliverFarren
#   Repository name: lewisham-council-scraper
#   Workflow filename: publish.yml
#   Environment name: pypi
# Then create a "pypi" environment in GitHub repository Settings → Environments.

jobs:
  build-distributions:
    name: Build and validate Python distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12 3.13

      - name: Install dependencies
        run: uv sync --all-packages --all-groups --locked

      - name: Run workspace checks
        run: make check

      - name: Build distributions
        run: uv build --no-sources --package lewisham-council-client

      - name: Verify distribution version matches tag
        shell: bash
        run: |
          expected_version="${GITHUB_REF_NAME#lewisham-council-client-v}"
          actual_version="$(
            uv run --no-project --isolated \
              --with ./dist/lewisham_council_client-*.whl \
              python -c 'from importlib.metadata import version; print(version("lewisham-council-client"))'
          )"

          if [[ "$actual_version" != "$expected_version" ]]; then
            echo "::error::Built version $actual_version does not match tag $expected_version"
            exit 1
          fi

      - name: Check distribution metadata
        run: uvx --from twine twine check dist/*

      - name: Test installed wheel on Python 3.12
        run: >
          uv run
          --no-project
          --isolated
          --python 3.12
          --with ./dist/lewisham_council_client-*.whl
          --with pytest
          --with pytest-asyncio
          pytest packages/lewisham-council-client/tests

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish lewisham-council-client to PyPI
    needs: build-distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lewisham-council-client
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
