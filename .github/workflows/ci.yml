name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

  typecheck:
    name: mypy (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [lewisham-council-client, lewisham-server, lewisham-mcp]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: mypy
        run: uv run --package ${{ matrix.package }} mypy src/
        working-directory: packages/${{ matrix.package }}

  test:
    name: pytest (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [lewisham-council-client, lewisham-server, lewisham-mcp]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: pytest
        run: uv run --package ${{ matrix.package }} pytest
        working-directory: packages/${{ matrix.package }}

  test-client-python-312:
    name: pytest (lewisham-council-client, Python 3.12 wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Build client distributions
        run: >
          uv build
          --no-sources
          --package lewisham-council-client

      - name: Test installed wheel
        run: >
          uv run
          --no-project
          --isolated
          --python 3.12
          --with ./dist/lewisham_council_client-*.whl
          --with pytest
          --with pytest-asyncio
          pytest packages/lewisham-council-client/tests
