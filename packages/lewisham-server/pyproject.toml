[project]
name = "lewisham-server"
dynamic = ["version"]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "lewisham-council-client",
    "pydantic-settings>=2.7.0",
    "rich>=15.0.0",
    "structlog>=26.1.0",
    "uvicorn[standard]>=0.32.0",
]

[tool.uv.sources]
lewisham-council-client = { workspace = true }

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
fallback-version = "0.1.0"

[tool.hatch.build.targets.wheel]
packages = ["src/lewisham_server"]

[dependency-groups]
dev = [
    "mypy>=1.13.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
]

[tool.ruff]
line-length = 88
target-version = "py312"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
mypy_path = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
